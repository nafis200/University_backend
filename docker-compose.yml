services:
  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testa
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    container_name: my-backend-container
    ports:
      - "5000:5000"
    env_file:
      - .env
    restart: always
    depends_on:
      - db
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run dev"

volumes:
  pgdata:
